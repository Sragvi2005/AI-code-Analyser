<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Code Vulnerability Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

textarea {
    width: 100%;
    height: 200px;
    background: #020617;
    color: white;
    border-radius: 10px;
    padding: 10px;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 6px;
}

/* Risk bar */
.bar {
    height: 10px;
    border-radius: 5px;
}

.high { background: #ef4444; }
.medium { background: #f59e0b; }
.low { background: #22c55e; }

/* Cards */
.card {
    background: #020617;
    padding: 10px;
    margin-top: 10px;
    border-left: 5px solid;
}

.high-border { border-color: red; }
.medium-border { border-color: orange; }
.low-border { border-color: green; }

</style>
</head>

<body>

<div class="container">

<h1>🔍 AI Code Vulnerability Analyzer</h1>

<form method="POST" action="/">
    <textarea name="code" placeholder="Paste your code here...">{{ code }}</textarea>
    <br>
    <button type="submit">Analyze Code</button>
</form>

{% if result %}

<h2> Risk Score: {{ risk_score }}/10</h2>

<div style="margin:10px 0;">
    <div class="bar {{ risk_level }}" style="width: {{ risk_score * 10 }}%;"></div>
</div>

<h2>⚠️ Issues Found</h2>

{% for issue in result %}
<div class="card 
    {% if issue.severity == 'HIGH' %}high-border
    {% elif issue.severity == 'MEDIUM' %}medium-border
    {% else %}low-border{% endif %}">

    <strong>Line {{ issue.line }} → {{ issue.type }}</strong><br>
    Severity: {{ issue.severity }}<br>
    {{ issue.message }}<br>
   
    💡 {{ issue.fix }}

</div>
{% endfor %}

{% endif %}

</div>

</body>
</html>
